<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSCALE — Image Resolution Enhancer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f5f5;
    --gray-100: #e8e8e8;
    --gray-200: #d0d0d0;
    --gray-400: #909090;
    --gray-600: #505050;
    --radius: 18px;
  }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    padding-bottom: 20px;
    border-bottom: 1.5px solid var(--black);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 4px;
    line-height: 1;
  }

  .tagline {
    font-size: 11px;
    color: var(--gray-600);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.8;
  }

  .main {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Drop Zone */
  .drop-zone {
    border: 2px dashed var(--gray-200);
    border-radius: var(--radius);
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--white);
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.dragging {
    border-color: var(--black);
    background: var(--gray-100);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .drop-icon {
    width: 52px;
    height: 52px;
    margin: 0 auto 16px;
    border: 2px solid var(--black);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .drop-icon svg { display: block; }

  .drop-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .drop-sub {
    font-size: 11px;
    color: var(--gray-400);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Controls Row */
  .controls-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }

  .control-box {
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 18px 20px;
  }

  .control-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 10px;
  }

  .control-box select,
  .control-box input[type="range"] {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--black);
    cursor: pointer;
    appearance: none;
  }

  .control-box select {
    border: 1.5px solid var(--gray-200);
    border-radius: 8px;
    padding: 6px 10px;
    background: var(--white);
  }

  .control-box select:focus {
    border-color: var(--black);
  }

  input[type="range"] {
    -webkit-appearance: none;
    height: 3px;
    background: var(--gray-200);
    border-radius: 2px;
    margin-top: 8px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--black);
    border-radius: 50%;
    cursor: pointer;
  }

  .range-val {
    font-size: 20px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  /* Preview Area */
  .preview-section {
    display: none;
    gap: 14px;
    flex-direction: column;
  }

  .preview-section.visible { display: flex; }

  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .preview-card {
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .preview-card-header {
    padding: 12px 16px;
    border-bottom: 1.5px solid var(--gray-200);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .preview-card-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-400);
  }

  .preview-card-dim {
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--black);
  }

  .preview-card canvas,
  .preview-card img {
    width: 100%;
    height: 260px;
    object-fit: contain;
    display: block;
    background: var(--gray-100);
  }

  /* Progress */
  .progress-wrap {
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: none;
  }

  .progress-wrap.visible { display: block; }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .progress-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-600);
  }

  .progress-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
  }

  .progress-bar-bg {
    height: 3px;
    background: var(--gray-200);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--black);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Action Button */
  .btn-upscale {
    width: 100%;
    padding: 18px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: none;
  }

  .btn-upscale:hover { background: var(--gray-600); }
  .btn-upscale.visible { display: block; }
  .btn-upscale:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-download {
    width: 100%;
    padding: 15px;
    background: var(--white);
    color: var(--black);
    border: 1.5px solid var(--black);
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: none;
    text-align: center;
    text-decoration: none;
  }

  .btn-download:hover { background: var(--black); color: var(--white); }
  .btn-download.visible { display: block; }

  /* Info strip */
  .info-strip {
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: none;
    gap: 0;
  }

  .info-strip.visible { display: grid; grid-template-columns: repeat(4, 1fr); }

  .info-item { text-align: center; }
  .info-item + .info-item { border-left: 1.5px solid var(--gray-200); }

  .info-key {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 4px;
  }

  .info-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }

  /* Hidden canvas for processing */
  #work-canvas { display: none; }

  .algo-note {
    font-size: 10px;
    color: var(--gray-400);
    letter-spacing: 1px;
    text-align: center;
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">UPSCALE</div>
  <div class="tagline">
    Image Resolution Enhancer<br>
    Lanczos · Bicubic · 4K Ready
  </div>
</header>

<div class="main">

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*">
    <div class="drop-icon">
      <svg width="24" height="24" fill="none" stroke="#0a0a0a" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M4 16l4-4 4 4 4-6 4 6"/>
        <rect x="2" y="3" width="20" height="18" rx="3"/>
      </svg>
    </div>
    <div class="drop-title">DROP IMAGE HERE</div>
    <div class="drop-sub">PNG · JPG · WEBP · BMP — up to 50MB</div>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <div class="control-box">
      <div class="control-label">Target Size</div>
      <select id="targetSize">
        <option value="2x">2× (Double)</option>
        <option value="3x">3× (Triple)</option>
        <option value="4x">4× (Quad)</option>
        <option value="4k">4K — 3840×2160</option>
        <option value="2k">2K — 2560×1440</option>
        <option value="1080p">1080p — 1920×1080</option>
        <option value="custom">Custom…</option>
      </select>
    </div>
    <div class="control-box">
      <div class="control-label">Algorithm</div>
      <select id="algorithm">
        <option value="lanczos">Lanczos (Sharp)</option>
        <option value="bicubic">Bicubic (Smooth)</option>
        <option value="bilinear">Bilinear (Fast)</option>
      </select>
    </div>
    <div class="control-box">
      <div class="control-label">Sharpening — <span id="sharpVal">0.5</span></div>
      <div class="range-val" id="sharpDisplay">50%</div>
      <input type="range" id="sharpSlider" min="0" max="1" step="0.05" value="0.5">
    </div>
  </div>

  <!-- Custom size row (hidden by default) -->
  <div class="controls-row" id="customRow" style="display:none; grid-template-columns: 1fr 1fr;">
    <div class="control-box">
      <div class="control-label">Custom Width (px)</div>
      <input type="number" id="customW" min="1" max="7680" placeholder="e.g. 3840" style="width:100%;border:1.5px solid var(--gray-200);border-radius:8px;padding:6px 10px;font-family:'DM Mono',monospace;font-size:13px;outline:none;background:var(--white);">
    </div>
    <div class="control-box">
      <div class="control-label">Custom Height (px)</div>
      <input type="number" id="customH" min="1" max="4320" placeholder="e.g. 2160" style="width:100%;border:1.5px solid var(--gray-200);border-radius:8px;padding:6px 10px;font-family:'DM Mono',monospace;font-size:13px;outline:none;background:var(--white);">
    </div>
  </div>

  <!-- Info Strip -->
  <div class="info-strip" id="infoStrip">
    <div class="info-item"><div class="info-key">Original</div><div class="info-val" id="infoOrig">—</div></div>
    <div class="info-item"><div class="info-key">Output</div><div class="info-val" id="infoOut">—</div></div>
    <div class="info-item"><div class="info-key">Scale</div><div class="info-val" id="infoScale">—</div></div>
    <div class="info-item"><div class="info-key">Format</div><div class="info-val" id="infoFmt">—</div></div>
  </div>

  <!-- Upscale Button -->
  <button class="btn-upscale" id="btnUpscale">UPSCALE IMAGE</button>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-top">
      <span class="progress-label" id="progressLabel">Processing…</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Preview Grid -->
  <div class="preview-section" id="previewSection">
    <div class="preview-grid">
      <div class="preview-card">
        <div class="preview-card-header">
          <span class="preview-card-title">Original</span>
          <span class="preview-card-dim" id="dimOrig">—</span>
        </div>
        <img id="origPreview" alt="Original">
      </div>
      <div class="preview-card">
        <div class="preview-card-header">
          <span class="preview-card-title">Upscaled</span>
          <span class="preview-card-dim" id="dimOut">—</span>
        </div>
        <canvas id="resultCanvas"></canvas>
      </div>
    </div>
    <a class="btn-download" id="btnDownload" download="upscaled.png">DOWNLOAD RESULT</a>
    <div class="algo-note" id="algoNote"></div>
  </div>

</div>

<canvas id="work-canvas"></canvas>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let srcImage = null;
let srcFile  = null;

// ─── Elements ────────────────────────────────────────────────────────────────
const dropZone     = document.getElementById('dropZone');
const fileInput    = document.getElementById('fileInput');
const targetSize   = document.getElementById('targetSize');
const algorithm    = document.getElementById('algorithm');
const sharpSlider  = document.getElementById('sharpSlider');
const sharpVal     = document.getElementById('sharpVal');
const sharpDisplay = document.getElementById('sharpDisplay');
const btnUpscale   = document.getElementById('btnUpscale');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressPct  = document.getElementById('progressPct');
const progressLabel= document.getElementById('progressLabel');
const previewSection=document.getElementById('previewSection');
const origPreview  = document.getElementById('origPreview');
const resultCanvas = document.getElementById('resultCanvas');
const btnDownload  = document.getElementById('btnDownload');
const infoStrip    = document.getElementById('infoStrip');
const customRow    = document.getElementById('customRow');
const workCanvas   = document.getElementById('work-canvas');
const algoNote     = document.getElementById('algoNote');

// ─── Events ──────────────────────────────────────────────────────────────────
sharpSlider.addEventListener('input', () => {
  sharpVal.textContent    = sharpSlider.value;
  sharpDisplay.textContent = Math.round(sharpSlider.value * 100) + '%';
});

targetSize.addEventListener('change', () => {
  customRow.style.display = targetSize.value === 'custom' ? 'grid' : 'none';
  if (srcImage) updateInfo();
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragging');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
});

btnUpscale.addEventListener('click', runUpscale);

// ─── Load File ───────────────────────────────────────────────────────────────
function loadFile(file) {
  srcFile = file;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    srcImage = img;
    origPreview.src = url;
    document.getElementById('dimOrig').textContent = img.naturalWidth + '×' + img.naturalHeight;
    document.getElementById('infoFmt').textContent  = file.type.split('/')[1].toUpperCase();
    updateInfo();
    infoStrip.classList.add('visible');
    btnUpscale.classList.add('visible');
    previewSection.classList.remove('visible');
    // reset result canvas
    const ctx2 = resultCanvas.getContext('2d');
    ctx2.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
  };
  img.src = url;
}

// ─── Compute output dimensions ────────────────────────────────────────────────
function getOutputDims() {
  if (!srcImage) return { w: 0, h: 0 };
  const W = srcImage.naturalWidth, H = srcImage.naturalHeight;
  const mode = targetSize.value;
  let ow, oh;

  if      (mode === '2x') { ow = W * 2; oh = H * 2; }
  else if (mode === '3x') { ow = W * 3; oh = H * 3; }
  else if (mode === '4x') { ow = W * 4; oh = H * 4; }
  else if (mode === '4k') { const r = Math.min(3840/W, 2160/H); ow = Math.round(W*r); oh = Math.round(H*r); }
  else if (mode === '2k') { const r = Math.min(2560/W, 1440/H); ow = Math.round(W*r); oh = Math.round(H*r); }
  else if (mode === '1080p'){ const r = Math.min(1920/W, 1080/H); ow = Math.round(W*r); oh = Math.round(H*r); }
  else if (mode === 'custom') {
    ow = parseInt(document.getElementById('customW').value) || W * 2;
    oh = parseInt(document.getElementById('customH').value) || H * 2;
  }
  return { w: ow, h: oh };
}

function updateInfo() {
  if (!srcImage) return;
  const W = srcImage.naturalWidth, H = srcImage.naturalHeight;
  const { w, h } = getOutputDims();
  const scale = (w / W).toFixed(2);
  document.getElementById('infoOrig').textContent  = W + '×' + H;
  document.getElementById('infoOut').textContent   = w + '×' + h;
  document.getElementById('infoScale').textContent = scale + '×';
}

// ─── Lanczos kernel ──────────────────────────────────────────────────────────
function lanczos(x, a) {
  if (x === 0) return 1;
  if (Math.abs(x) >= a) return 0;
  const px = Math.PI * x;
  return (a * Math.sin(px) * Math.sin(px / a)) / (px * px);
}

// ─── Bilinear interp helper ───────────────────────────────────────────────────
function bilinearInterp(src, srcW, srcH, dx, dy) {
  const x0 = Math.floor(dx), y0 = Math.floor(dy);
  const x1 = Math.min(x0 + 1, srcW - 1), y1 = Math.min(y0 + 1, srcH - 1);
  const wx = dx - x0, wy = dy - y0;
  const base = (y0 * srcW + x0) * 4;
  const b10  = (y0 * srcW + x1) * 4;
  const b01  = (y1 * srcW + x0) * 4;
  const b11  = (y1 * srcW + x1) * 4;
  const r = [], out = [];
  for (let c = 0; c < 4; c++) {
    const top    = src[base + c] * (1 - wx) + src[b10 + c] * wx;
    const bottom = src[b01 + c]  * (1 - wx) + src[b11 + c] * wx;
    out.push(top * (1 - wy) + bottom * wy);
  }
  return out;
}

// ─── Bicubic weight ───────────────────────────────────────────────────────────
function cubicWeight(t) {
  const a = -0.5;
  t = Math.abs(t);
  if (t <= 1) return (a + 2) * t * t * t - (a + 3) * t * t + 1;
  if (t < 2)  return a * t * t * t - 5 * a * t * t + 8 * a * t - 4 * a;
  return 0;
}

// ─── Unsharp mask ────────────────────────────────────────────────────────────
function unsharpMask(data, w, h, amount) {
  if (amount <= 0) return;
  const radius = 2;
  const blurred = new Uint8ClampedArray(data.length);
  // Simple box blur
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let r = 0, g = 0, b = 0, cnt = 0;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          const nx = Math.min(Math.max(x + dx, 0), w - 1);
          const ny = Math.min(Math.max(y + dy, 0), h - 1);
          const i = (ny * w + nx) * 4;
          r += data[i]; g += data[i+1]; b += data[i+2]; cnt++;
        }
      }
      const i = (y * w + x) * 4;
      blurred[i]   = r / cnt;
      blurred[i+1] = g / cnt;
      blurred[i+2] = b / cnt;
      blurred[i+3] = data[i+3];
    }
  }
  for (let i = 0; i < data.length; i += 4) {
    data[i]   = Math.min(255, Math.max(0, data[i]   + amount * (data[i]   - blurred[i])));
    data[i+1] = Math.min(255, Math.max(0, data[i+1] + amount * (data[i+1] - blurred[i+1])));
    data[i+2] = Math.min(255, Math.max(0, data[i+2] + amount * (data[i+2] - blurred[i+2])));
  }
}

// ─── Main upscale ────────────────────────────────────────────────────────────
async function runUpscale() {
  if (!srcImage) return;

  const { w: dstW, h: dstH } = getOutputDims();
  const srcW = srcImage.naturalWidth;
  const srcH = srcImage.naturalHeight;
  const algo = algorithm.value;
  const sharpAmt = parseFloat(sharpSlider.value) * 1.5;

  // Get source pixels
  workCanvas.width  = srcW;
  workCanvas.height = srcH;
  const wCtx = workCanvas.getContext('2d');
  wCtx.drawImage(srcImage, 0, 0);
  const srcData = wCtx.getImageData(0, 0, srcW, srcH).data;

  // Prepare destination
  const dstData = new Uint8ClampedArray(dstW * dstH * 4);

  btnUpscale.disabled = true;
  progressWrap.classList.add('visible');
  previewSection.classList.remove('visible');

  setProgress(0, 'Analysing image…');
  await sleep(50);

  const scaleX = srcW / dstW;
  const scaleY = srcH / dstH;

  if (algo === 'bilinear') {
    setProgress(10, 'Bilinear upscaling…');
    await sleep(20);
    for (let y = 0; y < dstH; y++) {
      for (let x = 0; x < dstW; x++) {
        const sx = x * scaleX, sy = y * scaleY;
        const px = bilinearInterp(srcData, srcW, srcH, sx, sy);
        const i = (y * dstW + x) * 4;
        dstData[i]   = px[0];
        dstData[i+1] = px[1];
        dstData[i+2] = px[2];
        dstData[i+3] = px[3];
      }
      if (y % 200 === 0) {
        setProgress(10 + Math.round(70 * y / dstH), 'Bilinear upscaling…');
        await sleep(0);
      }
    }

  } else if (algo === 'bicubic') {
    setProgress(10, 'Bicubic upscaling…');
    await sleep(20);
    for (let y = 0; y < dstH; y++) {
      for (let x = 0; x < dstW; x++) {
        const sx = x * scaleX, sy = y * scaleY;
        const x0 = Math.floor(sx), y0 = Math.floor(sy);
        const rgba = [0, 0, 0, 0];
        let totalW = 0;
        for (let ky = -1; ky <= 2; ky++) {
          for (let kx = -1; kx <= 2; kx++) {
            const nx = Math.min(Math.max(x0 + kx, 0), srcW - 1);
            const ny = Math.min(Math.max(y0 + ky, 0), srcH - 1);
            const w  = cubicWeight(sx - (x0 + kx)) * cubicWeight(sy - (y0 + ky));
            const si = (ny * srcW + nx) * 4;
            rgba[0] += srcData[si]   * w;
            rgba[1] += srcData[si+1] * w;
            rgba[2] += srcData[si+2] * w;
            rgba[3] += srcData[si+3] * w;
            totalW += w;
          }
        }
        const di = (y * dstW + x) * 4;
        dstData[di]   = Math.min(255, Math.max(0, rgba[0] / totalW));
        dstData[di+1] = Math.min(255, Math.max(0, rgba[1] / totalW));
        dstData[di+2] = Math.min(255, Math.max(0, rgba[2] / totalW));
        dstData[di+3] = Math.min(255, Math.max(0, rgba[3] / totalW));
      }
      if (y % 100 === 0) {
        setProgress(10 + Math.round(70 * y / dstH), 'Bicubic upscaling…');
        await sleep(0);
      }
    }

  } else {
    // Lanczos-3
    const a = 3;
    setProgress(10, 'Lanczos upscaling…');
    await sleep(20);
    for (let y = 0; y < dstH; y++) {
      for (let x = 0; x < dstW; x++) {
        const sx = x * scaleX, sy = y * scaleY;
        const x0 = Math.floor(sx), y0 = Math.floor(sy);
        let r = 0, g = 0, b = 0, aa = 0, totalW = 0;
        for (let ky = -a + 1; ky <= a; ky++) {
          for (let kx = -a + 1; kx <= a; kx++) {
            const nx = Math.min(Math.max(x0 + kx, 0), srcW - 1);
            const ny = Math.min(Math.max(y0 + ky, 0), srcH - 1);
            const wt = lanczos(sx - (x0 + kx), a) * lanczos(sy - (y0 + ky), a);
            const si = (ny * srcW + nx) * 4;
            r += srcData[si]   * wt;
            g += srcData[si+1] * wt;
            b += srcData[si+2] * wt;
            aa+= srcData[si+3] * wt;
            totalW += wt;
          }
        }
        const di = (y * dstW + x) * 4;
        dstData[di]   = Math.min(255, Math.max(0, r  / totalW));
        dstData[di+1] = Math.min(255, Math.max(0, g  / totalW));
        dstData[di+2] = Math.min(255, Math.max(0, b  / totalW));
        dstData[di+3] = Math.min(255, Math.max(0, aa / totalW));
      }
      if (y % 80 === 0) {
        setProgress(10 + Math.round(70 * y / dstH), 'Lanczos upscaling…');
        await sleep(0);
      }
    }
  }

  setProgress(82, 'Applying sharpening…');
  await sleep(30);
  unsharpMask(dstData, dstW, dstH, sharpAmt);

  setProgress(95, 'Rendering output…');
  await sleep(30);

  // Draw to result canvas
  resultCanvas.width  = dstW;
  resultCanvas.height = dstH;
  const rCtx = resultCanvas.getContext('2d');
  const imgData = new ImageData(dstData, dstW, dstH);
  rCtx.putImageData(imgData, 0, 0);

  // Set download
  const ext    = (srcFile.type === 'image/jpeg') ? 'jpg' : 'png';
  const mime   = (srcFile.type === 'image/jpeg') ? 'image/jpeg' : 'image/png';
  const quality= (mime === 'image/jpeg') ? 0.95 : 1;
  const dataUrl= resultCanvas.toDataURL(mime, quality);
  btnDownload.href     = dataUrl;
  btnDownload.download = 'upscaled_' + dstW + 'x' + dstH + '.' + ext;
  btnDownload.classList.add('visible');

  document.getElementById('dimOut').textContent = dstW + '×' + dstH;

  algoNote.textContent = `Algorithm: ${algo.charAt(0).toUpperCase()+algo.slice(1)} · Output: ${dstW}×${dstH} · Sharpening: ${Math.round(sharpAmt/1.5*100)}%`;

  setProgress(100, 'Done!');
  await sleep(300);

  progressWrap.classList.remove('visible');
  previewSection.classList.add('visible');
  btnUpscale.disabled = false;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function setProgress(pct, label) {
  progressFill.style.width = pct + '%';
  progressPct.textContent  = pct + '%';
  progressLabel.textContent = label;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}
</script>
