<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NVIDIA NIM Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      padding: 24px;
    }

    #setup h2 { font-size: 20px; color: #76b900; }

    #setup input {
      width: 100%;
      max-width: 500px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    #setup input:focus { border-color: #76b900; }

    #setup button {
      padding: 12px 32px;
      background: #76b900;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    #chat { display: none; flex-direction: column; height: 100vh; }

    #header {
      padding: 14px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      font-size: 15px;
      font-weight: bold;
      color: #76b900;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .msg.user {
      background: #76b900;
      color: #000;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.ai {
      background: #1e1e1e;
      color: #eee;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.ai.thinking { color: #666; font-style: italic; }

    #bottom {
      padding: 16px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f0f0f;
      color: #fff;
      font-size: 14px;
      outline: none;
      resize: none;
    }

    #input:focus { border-color: #76b900; }

    #send {
      padding: 12px 20px;
      background: #76b900;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    #send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <div id="setup">
    <h2>NVIDIA NIM Chat</h2>
    <input type="password" id="apiKey" placeholder="Cola aqui a tua nvapi-... key" />
    <button onclick="iniciar()">Entrar</button>
  </div>

  <div id="chat">
    <div id="header">NVIDIA NIM — minimaxai/minimax-m2.7</div>
    <div id="messages"></div>
    <div id="bottom">
      <textarea id="input" rows="1" placeholder="Escreve uma mensagem..."></textarea>
      <button id="send" onclick="enviar()">Enviar</button>
    </div>
  </div>

  <script>
    let apiKey = "";
    const messages = [];

    function iniciar() {
      const key = document.getElementById("apiKey").value.trim();
      if (!key.startsWith("nvapi-")) return alert("Key inválida.");
      apiKey = key;
      document.getElementById("setup").style.display = "none";
      document.getElementById("chat").style.display = "flex";
    }

    document.getElementById("input")?.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviar(); }
    });

    function addMsg(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "ai");
      div.textContent = text;
      document.getElementById("messages").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
      return div;
    }

    async function enviar() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      document.getElementById("send").disabled = true;

      addMsg("user", text);
      messages.push({ role: "user", content: text });

      const thinking = addMsg("ai", "A pensar...");
      thinking.classList.add("thinking");

      try {
        const res = await fetch("http://localhost:3000", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + apiKey,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "minimaxai/minimax-m2.7",
            messages: messages,
            temperature: 1,
            top_p: 0.95,
            max_tokens: 8192,
            stream: false
          })
        });

        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content ?? "Sem resposta.";

        thinking.classList.remove("thinking");
        thinking.textContent = reply;
        messages.push({ role: "assistant", content: reply });

      } catch (e) {
        thinking.textContent = "Erro: " + e.message;
      }

      document.getElementById("send").disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
