<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIM Chat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111;
  --bg3: #181818;
  --bg4: #222;
  --border: #2a2a2a;
  --accent: #76b900;
  --text: #e8e8e8;
  --text2: #888;
  --text3: #444;
  --radius: 14px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* SETUP */
#setup {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; gap:20px; padding:32px;
}
#setup .logo { font-size:13px; font-weight:600; letter-spacing:4px; color:var(--accent); text-transform:uppercase; }
#setup h1 { font-size:28px; font-weight:300; color:var(--text); }
#setup input {
  width:100%; max-width:480px; padding:14px 18px;
  border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--bg3); color:var(--text); font-size:14px;
  font-family:'JetBrains Mono',monospace; outline:none; transition:.2s;
}
#setup input:focus { border-color:var(--accent); }
#setup button {
  padding:14px 40px; background:var(--accent); color:#000;
  border:none; border-radius:var(--radius-sm); font-weight:600;
  font-size:15px; cursor:pointer; font-family:'Sora',sans-serif;
  transition:.15s;
}
#setup button:hover { background:#89d400; }

/* CHAT */
#chat { display:none; flex-direction:column; height:100vh; }

#topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 18px; background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#topbar .left { display:flex; align-items:center; gap:10px; }
#topbar .model-name { font-size:13px; font-weight:600; color:var(--accent); }
#topbar .status { font-size:11px; color:var(--text2); }
#topbar .right { display:flex; gap:8px; }

.icon-btn {
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text2); border-radius:var(--radius-sm);
  padding:8px 12px; cursor:pointer; font-size:13px;
  transition:.15s; display:flex; align-items:center; gap:6px;
}
.icon-btn:hover { border-color:var(--accent); color:var(--text); }
.icon-btn svg { width:15px; height:15px; }

#messages {
  flex:1; overflow-y:auto; padding:24px 16px;
  display:flex; flex-direction:column; gap:20px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar { width:4px; }
#messages::-webkit-scrollbar-track { background:transparent; }
#messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.msg-wrap { display:flex; flex-direction:column; gap:6px; max-width:820px; width:100%; }
.msg-wrap.user { align-self:flex-end; align-items:flex-end; }
.msg-wrap.ai { align-self:flex-start; align-items:flex-start; }

.msg-label { font-size:11px; color:var(--text3); font-weight:500; letter-spacing:1px; text-transform:uppercase; padding:0 4px; }

.msg {
  padding:14px 18px; border-radius:var(--radius);
  font-size:14px; line-height:1.75; max-width:100%;
}
.msg.user {
  background:var(--accent); color:#000; font-weight:500;
  border-bottom-right-radius:4px;
}
.msg.ai {
  background:var(--bg3); color:var(--text);
  border:1px solid var(--border); border-bottom-left-radius:4px;
}
.msg.thinking {
  background:transparent; border:1px dashed var(--border);
  color:var(--text2); font-style:italic; font-size:13px;
}

/* MARKDOWN STYLES dentro de .msg.ai */
.msg.ai h1,.msg.ai h2,.msg.ai h3 {
  font-weight:600; margin:14px 0 6px; line-height:1.3;
}
.msg.ai h1 { font-size:18px; color:var(--accent); }
.msg.ai h2 { font-size:16px; color:var(--text); border-bottom:1px solid var(--border); padding-bottom:4px; }
.msg.ai h3 { font-size:14px; color:var(--text); }
.msg.ai p { margin:6px 0; }
.msg.ai ul,.msg.ai ol { padding-left:20px; margin:6px 0; }
.msg.ai li { margin:3px 0; }
.msg.ai strong { color:#fff; font-weight:600; }
.msg.ai em { color:var(--text2); font-style:italic; }
.msg.ai a { color:var(--accent); text-decoration:none; }
.msg.ai a:hover { text-decoration:underline; }
.msg.ai blockquote {
  border-left:3px solid var(--accent); padding:8px 14px;
  margin:10px 0; background:var(--bg4); border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  color:var(--text2);
}
.msg.ai hr { border:none; border-top:1px solid var(--border); margin:12px 0; }
.msg.ai table { width:100%; border-collapse:collapse; margin:10px 0; font-size:13px; }
.msg.ai th { background:var(--bg4); padding:8px 12px; text-align:left; border:1px solid var(--border); color:var(--accent); }
.msg.ai td { padding:8px 12px; border:1px solid var(--border); }
.msg.ai tr:nth-child(even) { background:var(--bg4); }

/* INLINE CODE */
.msg.ai code:not(.block-code) {
  background:var(--bg4); color:#f9a825;
  padding:2px 7px; border-radius:5px;
  font-family:'JetBrains Mono',monospace; font-size:12px;
  border:1px solid var(--border);
}

/* CODE CANVAS */
.code-canvas {
  background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden; margin:10px 0; width:100%;
}
.code-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px; background:var(--bg4); border-bottom:1px solid var(--border);
}
.code-lang {
  font-size:11px; font-weight:600; color:var(--accent);
  letter-spacing:2px; text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
}
.code-copy {
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text2); padding:4px 12px; border-radius:5px;
  font-size:11px; cursor:pointer; font-family:'Sora',sans-serif;
  transition:.15s;
}
.code-copy:hover { border-color:var(--accent); color:var(--text); }
.code-body {
  padding:16px; overflow-x:auto; font-family:'JetBrains Mono',monospace;
  font-size:13px; line-height:1.8; color:#e8e8e8;
}
.code-body::-webkit-scrollbar { height:4px; }
.code-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* SYNTAX HIGHLIGHT básico */
.tok-keyword { color:#c792ea; }
.tok-string { color:#c3e88d; }
.tok-comment { color:#546e7a; font-style:italic; }
.tok-number { color:#f78c6c; }
.tok-function { color:#82aaff; }
.tok-tag { color:#f07178; }
.tok-attr { color:#ffcb6b; }

/* BOTTOM */
#bottom {
  padding:14px 16px; background:var(--bg2);
  border-top:1px solid var(--border); flex-shrink:0;
}
.input-wrap {
  display:flex; align-items:flex-end; gap:10px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--radius); padding:10px 14px;
  transition:.2s;
}
.input-wrap:focus-within { border-color:var(--accent); }
#input {
  flex:1; background:transparent; border:none; color:var(--text);
  font-size:14px; font-family:'Sora',sans-serif; outline:none;
  resize:none; min-height:22px; max-height:160px; line-height:1.6;
}
#input::placeholder { color:var(--text3); }
#send {
  background:var(--accent); border:none; border-radius:var(--radius-sm);
  padding:9px 16px; cursor:pointer; display:flex; align-items:center;
  transition:.15s; flex-shrink:0;
}
#send:hover { background:#89d400; }
#send:disabled { opacity:.35; cursor:not-allowed; }
#send svg { width:16px; height:16px; color:#000; }

.bottom-info {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:8px; padding:0 4px;
}
.bottom-info span { font-size:11px; color:var(--text3); }
.mode-pills { display:flex; gap:6px; }
.pill {
  font-size:10px; padding:3px 10px; border-radius:20px;
  border:1px solid var(--border); color:var(--text3); cursor:pointer;
  transition:.15s; background:transparent; font-family:'Sora',sans-serif;
}
.pill.active { border-color:var(--accent); color:var(--accent); background:rgba(118,185,0,.08); }

/* SETTINGS PANEL */
#settings-panel {
  position:fixed; top:0; right:0; width:320px; height:100vh;
  background:var(--bg2); border-left:1px solid var(--border);
  z-index:100; transform:translateX(100%); transition:.3s ease;
  display:flex; flex-direction:column; overflow:hidden;
}
#settings-panel.open { transform:translateX(0); }

.settings-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px; border-bottom:1px solid var(--border);
}
.settings-header h2 { font-size:14px; font-weight:600; color:var(--text); }
.close-btn {
  background:transparent; border:none; color:var(--text2);
  cursor:pointer; font-size:20px; line-height:1;
}

.settings-body { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:24px; }
.settings-body::-webkit-scrollbar { width:3px; }
.settings-body::-webkit-scrollbar-thumb { background:var(--border); }

.setting-group h3 { font-size:11px; font-weight:600; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }

.setting-item { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.setting-item label { font-size:13px; color:var(--text2); display:flex; justify-content:space-between; }
.setting-item label span { color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:12px; }

.setting-item input[type=range] {
  width:100%; accent-color:var(--accent); height:4px; cursor:pointer;
}
.setting-item select {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  padding:9px 12px; border-radius:var(--radius-sm); font-size:13px;
  font-family:'Sora',sans-serif; outline:none; cursor:pointer;
}
.setting-item select:focus { border-color:var(--accent); }

.toggle-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0; border-bottom:1px solid var(--border);
}
.toggle-row .info { display:flex; flex-direction:column; gap:2px; }
.toggle-row .info strong { font-size:13px; color:var(--text); }
.toggle-row .info small { font-size:11px; color:var(--text3); }

.toggle {
  width:40px; height:22px; background:var(--bg4);
  border-radius:11px; border:1px solid var(--border);
  cursor:pointer; position:relative; transition:.2s;
}
.toggle.on { background:var(--accent); border-color:var(--accent); }
.toggle::after {
  content:''; position:absolute; width:16px; height:16px;
  background:#fff; border-radius:50%; top:2px; left:2px; transition:.2s;
}
.toggle.on::after { left:20px; }

.clear-btn {
  width:100%; padding:12px; background:transparent;
  border:1px solid #ff444433; color:#ff4444; border-radius:var(--radius-sm);
  font-size:13px; cursor:pointer; font-family:'Sora',sans-serif; transition:.15s;
}
.clear-btn:hover { background:#ff444411; }

/* OVERLAY */
#overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
  z-index:99; backdrop-filter:blur(2px);
}
#overlay.show { display:block; }

/* CURSOR BLINK */
.cursor { display:inline-block; width:2px; height:14px; background:var(--accent); animation:blink .7s infinite; vertical-align:middle; margin-left:2px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* RESPONSIVE */
@media(max-width:600px) {
  #settings-panel { width:100%; }
  .msg-wrap { max-width:100%; }
  #topbar .model-name { font-size:11px; }
}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">NVIDIA NIM</div>
  <h1>Chat Interface</h1>
  <input type="password" id="apiKey" placeholder="nvapi-..." autocomplete="off"/>
  <button onclick="iniciar()">Iniciar</button>
</div>

<!-- OVERLAY -->
<div id="overlay" onclick="fecharSettings()"></div>

<!-- CHAT -->
<div id="chat">

  <div id="topbar">
    <div class="left">
      <div>
        <div class="model-name" id="model-label">minimax-m2.7</div>
        <div class="status" id="status-label">Pronto</div>
      </div>
    </div>
    <div class="right">
      <button class="icon-btn" onclick="limparChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
      <button class="icon-btn" onclick="abrirSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Definições
      </button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="bottom">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Escreve uma mensagem..."></textarea>
      <button id="send" onclick="enviar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="bottom-info">
      <span id="token-info">0 tokens</span>
      <div class="mode-pills">
        <button class="pill active" id="pill-normal" onclick="setMode('normal')">Normal</button>
        <button class="pill" id="pill-reason" onclick="setMode('reason')">Raciocínio</button>
        <button class="pill" id="pill-flash" onclick="setMode('flash')">Flash</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div id="settings-panel">
  <div class="settings-header">
    <h2>Definições</h2>
    <button class="close-btn" onclick="fecharSettings()">✕</button>
  </div>
  <div class="settings-body">

    <div class="setting-group">
      <h3>Modelo</h3>
      <div class="setting-item">
        <select id="cfg-model" onchange="updateModel()">
          <option value="minimaxai/minimax-m2.7">MiniMax M2.7 — 230B</option>
          <option value="deepseek-ai/deepseek-r1">DeepSeek R1 — Raciocínio</option>
          <option value="deepseek-ai/deepseek-v3-0324">DeepSeek V3 — Flash</option>
          <option value="meta/llama-3.3-70b-instruct">Llama 3.3 70B</option>
          <option value="mistralai/mistral-large-2-instruct">Mistral Large 2</option>
          <option value="nvidia/llama-3.1-nemotron-ultra-253b-v1">Nemotron Ultra 253B</option>
          <option value="google/gemma-3-27b-it">Gemma 3 27B</option>
          <option value="qwen/qwen2.5-72b-instruct">Qwen 2.5 72B</option>
        </select>
      </div>
    </div>

    <div class="setting-group">
      <h3>Parâmetros</h3>
      <div class="setting-item">
        <label>Temperatura <span id="lbl-temp">0.7</span></label>
        <input type="range" id="cfg-temp" min="0" max="2" step="0.05" value="0.7" oninput="document.getElementById('lbl-temp').textContent=this.value"/>
      </div>
      <div class="setting-item">
        <label>Top P <span id="lbl-topp">0.95</span></label>
        <input type="range" id="cfg-topp" min="0" max="1" step="0.01" value="0.95" oninput="document.getElementById('lbl-topp').textContent=this.value"/>
      </div>
      <div class="setting-item">
        <label>Max Tokens <span id="lbl-maxtok">4096</span></label>
        <input type="range" id="cfg-maxtok" min="256" max="32768" step="256" value="4096" oninput="document.getElementById('lbl-maxtok').textContent=this.value"/>
      </div>
      <div class="setting-item">
        <label>Frequency Penalty <span id="lbl-freq">0</span></label>
        <input type="range" id="cfg-freq" min="-2" max="2" step="0.1" value="0" oninput="document.getElementById('lbl-freq').textContent=this.value"/>
      </div>
      <div class="setting-item">
        <label>Presence Penalty <span id="lbl-pres">0</span></label>
        <input type="range" id="cfg-pres" min="-2" max="2" step="0.1" value="0" oninput="document.getElementById('lbl-pres').textContent=this.value"/>
      </div>
    </div>

    <div class="setting-group">
      <h3>Comportamento</h3>
      <div class="toggle-row">
        <div class="info"><strong>Streaming</strong><small>Resposta em tempo real</small></div>
        <div class="toggle on" id="tog-stream" onclick="toggleSetting('stream')"></div>
      </div>
      <div class="toggle-row">
        <div class="info"><strong>Raciocínio avançado</strong><small>Chain-of-thought interno</small></div>
        <div class="toggle" id="tog-reason" onclick="toggleSetting('reason')"></div>
      </div>
      <div class="toggle-row">
        <div class="info"><strong>Modo Flash</strong><small>Respostas mais rápidas</small></div>
        <div class="toggle" id="tog-flash" onclick="toggleSetting('flash')"></div>
      </div>
      <div class="toggle-row">
        <div class="info"><strong>Histórico</strong><small>Manter contexto da conversa</small></div>
        <div class="toggle on" id="tog-history" onclick="toggleSetting('history')"></div>
      </div>
    </div>

    <div class="setting-group">
      <h3>Sistema</h3>
      <div class="setting-item">
        <label>Prompt de sistema</label>
        <textarea id="cfg-system" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:13px;font-family:'Sora',sans-serif;resize:vertical;min-height:80px;outline:none;width:100%;" placeholder="Opcional..."></textarea>
      </div>
    </div>

    <div class="setting-group">
      <h3>Dados</h3>
      <button class="clear-btn" onclick="limparChat()">Limpar conversa</button>
    </div>

  </div>
</div>

<script>
let apiKey = "";
let messages = [];
let totalTokens = 0;
let isStreaming = false;

const settings = {
  stream: true,
  reason: false,
  flash: false,
  history: true
};

function iniciar() {
  const k = document.getElementById("apiKey").value.trim();
  if (!k.startsWith("nvapi-")) { alert("Key inválida. Deve começar com nvapi-"); return; }
  apiKey = k;
  document.getElementById("setup").style.display = "none";
  document.getElementById("chat").style.display = "flex";
}

function abrirSettings() {
  document.getElementById("settings-panel").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}
function fecharSettings() {
  document.getElementById("settings-panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

function toggleSetting(key) {
  settings[key] = !settings[key];
  document.getElementById("tog-" + key).classList.toggle("on", settings[key]);
}

function updateModel() {
  const m = document.getElementById("cfg-model").value;
  const label = document.getElementById("cfg-model").options[document.getElementById("cfg-model").selectedIndex].text.split(" —")[0];
  document.getElementById("model-label").textContent = label;
}

function setMode(mode) {
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  document.getElementById("pill-" + mode).classList.add("active");
  if (mode === "reason") {
    settings.reason = true; settings.flash = false;
    document.getElementById("tog-reason").classList.add("on");
    document.getElementById("tog-flash").classList.remove("on");
    document.getElementById("cfg-model").value = "deepseek-ai/deepseek-r1";
    updateModel();
  } else if (mode === "flash") {
    settings.flash = true; settings.reason = false;
    document.getElementById("tog-flash").classList.add("on");
    document.getElementById("tog-reason").classList.remove("on");
    document.getElementById("cfg-model").value = "deepseek-ai/deepseek-v3-0324";
    updateModel();
  } else {
    settings.reason = false; settings.flash = false;
    document.getElementById("tog-reason").classList.remove("on");
    document.getElementById("tog-flash").classList.remove("on");
    document.getElementById("cfg-model").value = "minimaxai/minimax-m2.7";
    updateModel();
  }
}

function limparChat() {
  messages = [];
  document.getElementById("messages").innerHTML = "";
  totalTokens = 0;
  document.getElementById("token-info").textContent = "0 tokens";
  fecharSettings();
}

// AUTO RESIZE TEXTAREA
const inputEl = document.getElementById("input");
inputEl.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 160) + "px";
});
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviar(); }
});

function addUserMsg(text) {
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap user";
  wrap.innerHTML = `<div class="msg-label">Tu</div><div class="msg user">${escapeHtml(text)}</div>`;
  document.getElementById("messages").appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth", block: "end" });
}

function createAiMsgEl() {
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap ai";
  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = document.getElementById("cfg-model").options[document.getElementById("cfg-model").selectedIndex].text.split(" —")[0];
  const msg = document.createElement("div");
  msg.className = "msg ai";
  wrap.appendChild(label);
  wrap.appendChild(msg);
  document.getElementById("messages").appendChild(wrap);
  return msg;
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function highlight(code, lang) {
  let h = escapeHtml(code);
  if (["js","javascript","ts","typescript","jsx","tsx"].includes(lang)) {
    h = h.replace(/\/\/.*/g, m => `<span class="tok-comment">${m}</span>`);
    h = h.replace(/('.*?'|".*?"|`[\s\S]*?`)/g, m => `<span class="tok-string">${m}</span>`);
    h = h.replace(/\b(const|let|var|function|return|if|else|for|while|class|import|export|default|from|async|await|new|typeof|instanceof|true|false|null|undefined|try|catch|finally|throw|of|in|=>)\b/g, m => `<span class="tok-keyword">${m}</span>`);
    h = h.replace(/\b(\d+\.?\d*)\b/g, m => `<span class="tok-number">${m}</span>`);
    h = h.replace(/\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*(?=\()/g, m => `<span class="tok-function">${m}</span>`);
  } else if (["html","xml"].includes(lang)) {
    h = h.replace(/(&lt;\/?[a-zA-Z][^&]*?&gt;)/g, tag => {
      return tag.replace(/^(&lt;\/?[a-zA-Z0-9-]+)/, m => `<span class="tok-tag">${m}</span>`)
                .replace(/([a-zA-Z-]+=)/g, m => `<span class="tok-attr">${m}</span>`)
                .replace(/(".*?")/g, m => `<span class="tok-string">${m}</span>`);
    });
  } else if (["py","python"].includes(lang)) {
    h = h.replace(/#.*/g, m => `<span class="tok-comment">${m}</span>`);
    h = h.replace(/('.*?'|".*?")/g, m => `<span class="tok-string">${m}</span>`);
    h = h.replace(/\b(def|class|import|from|return|if|elif|else|for|while|in|not|and|or|True|False|None|try|except|finally|with|as|lambda|pass|break|continue|raise|yield|async|await)\b/g, m => `<span class="tok-keyword">${m}</span>`);
    h = h.replace(/\b(\d+\.?\d*)\b/g, m => `<span class="tok-number">${m}</span>`);
  } else if (["css"].includes(lang)) {
    h = h.replace(/(\/\*[\s\S]*?\*\/)/g, m => `<span class="tok-comment">${m}</span>`);
    h = h.replace(/([.#]?[a-zA-Z][a-zA-Z0-9-_]*)\s*\{/g, m => `<span class="tok-function">${m}</span>`);
    h = h.replace(/(:\s*)([^;{]+)/g, (_, colon, val) => `${colon}<span class="tok-string">${val}</span>`);
  }
  return h;
}

function renderMarkdown(text) {
  let html = text;

  // Code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const l = (lang || "code").toLowerCase();
    const highlighted = highlight(code.trim(), l);
    const id = "code_" + Math.random().toString(36).slice(2);
    return `<div class="code-canvas">
      <div class="code-header">
        <span class="code-lang">${l}</span>
        <button class="code-copy" onclick="copiarCodigo('${id}')">Copiar</button>
      </div>
      <pre class="code-body" id="${id}">${highlighted}</pre>
    </div>`;
  });

  // Headings
  html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");

  // Bold / italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html = html.replace(/_(.+?)_/g, "<em>$1</em>");

  // Blockquote
  html = html.replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>");

  // Horizontal rule
  html = html.replace(/^---$/gm, "<hr>");

  // Inline code
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");

  // Links
  html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Tables
  html = html.replace(/(\|.+\|\n\|[-| :]+\|\n(?:\|.+\|\n?)+)/g, tableStr => {
    const rows = tableStr.trim().split("\n");
    let table = "<table>";
    rows.forEach((row, i) => {
      if (i === 1) return;
      const cells = row.split("|").filter((_, ci) => ci > 0 && ci < row.split("|").length - 1);
      const tag = i === 0 ? "th" : "td";
      table += "<tr>" + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join("") + "</tr>";
    });
    return table + "</table>";
  });

  // Lists
  html = html.replace(/^(\d+)\. (.+)$/gm, "<li>$2</li>");
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ol>${m}</ol>`);
  html = html.replace(/^[-*] (.+)$/gm, "<li>$1</li>");
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

  // Paragraphs
  html = html.replace(/\n\n+/g, "</p><p>");
  html = "<p>" + html + "</p>";
  html = html.replace(/<p>\s*(<(?:h[1-3]|ul|ol|blockquote|hr|div|table|pre)[^>]*>)/g, "$1");
  html = html.replace(/(<\/(?:h[1-3]|ul|ol|blockquote|div|table|pre)>)\s*<\/p>/g, "$1");
  html = html.replace(/<p>\s*<\/p>/g, "");

  return html;
}

function copiarCodigo(id) {
  const el = document.getElementById(id);
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = el.parentElement.querySelector(".code-copy");
    btn.textContent = "Copiado!";
    setTimeout(() => btn.textContent = "Copiar", 2000);
  });
}

async function enviar() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  inputEl.value = "";
  inputEl.style.height = "auto";
  document.getElementById("send").disabled = true;
  isStreaming = true;
  document.getElementById("status-label").textContent = "A gerar...";

  addUserMsg(text);

  if (settings.history) {
    messages.push({ role: "user", content: text });
  }

  const msgEl = createAiMsgEl();
  msgEl.innerHTML = '<span class="cursor"></span>';

  const systemPrompt = document.getElementById("cfg-system").value.trim();
  const model = document.getElementById("cfg-model").value;
  const temp = parseFloat(document.getElementById("cfg-temp").value);
  const topp = parseFloat(document.getElementById("cfg-topp").value);
  const maxTok = parseInt(document.getElementById("cfg-maxtok").value);
  const freq = parseFloat(document.getElementById("cfg-freq").value);
  const pres = parseFloat(document.getElementById("cfg-pres").value);

  const msgs = [];
  if (systemPrompt) msgs.push({ role: "system", content: systemPrompt });
  if (settings.history) {
    msgs.push(...messages);
  } else {
    msgs.push({ role: "user", content: text });
  }

  let fullText = "";

  try {
    if (settings.stream) {
      const res = await fetch("http://localhost:3000", {
        method: "POST",
        headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
        body: JSON.stringify({ model, messages: msgs, temperature: temp, top_p: topp, max_tokens: maxTok, frequency_penalty: freq, presence_penalty: pres, stream: true })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split("\n").filter(l => l.startsWith("data: "));
        for (const line of lines) {
          const json = line.slice(6);
          if (json === "[DONE]") continue;
          try {
            const parsed = JSON.parse(json);
            const delta = parsed.choices?.[0]?.delta?.content;
            if (delta) {
              fullText += delta;
              msgEl.innerHTML = renderMarkdown(fullText) + '<span class="cursor"></span>';
              msgEl.scrollIntoView({ behavior: "smooth", block: "end" });
            }
            if (parsed.usage) {
              totalTokens += parsed.usage.total_tokens || 0;
              document.getElementById("token-info").textContent = totalTokens + " tokens";
            }
          } catch {}
        }
      }
    } else {
      const res = await fetch("http://localhost:3000", {
        method: "POST",
        headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
        body: JSON.stringify({ model, messages: msgs, temperature: temp, top_p: topp, max_tokens: maxTok, frequency_penalty: freq, presence_penalty: pres, stream: false })
      });
      const data = await res.json();
      fullText = data.choices?.[0]?.message?.content ?? "Sem resposta.";
      if (data.usage) {
        totalTokens += data.usage.total_tokens || 0;
        document.getElementById("token-info").textContent = totalTokens + " tokens";
      }
    }

    msgEl.innerHTML = renderMarkdown(fullText);
    if (settings.history) messages.push({ role: "assistant", content: fullText });

  } catch (e) {
    msgEl.innerHTML = `<span style="color:#ff4444">Erro: ${e.message}</span>`;
  }

  isStreaming = false;
  document.getElementById("send").disabled = false;
  document.getElementById("status-label").textContent = "Pronto";
  inputEl.focus();
}
</script>
