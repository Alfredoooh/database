<style>
/* ═══════════════════════════════════════════════
   VARIABLES & THEMES
═══════════════════════════════════════════════ */
:root {
  --font-ui: 'Syne', sans-serif;
  --font-code: 'JetBrains Mono', monospace;

  /* Sizes */
  --topbar-h: 48px;
  --editor-tabs-h: 40px;
  --device-bar-w: 64px;
  --resize-w: 5px;
  --editor-w: 50%;
}

[data-theme="dark"] {
  --bg:           #0d0d0f;
  --surface:      #141416;
  --surface2:     #1c1c1f;
  --surface3:     #252528;
  --border:       rgba(255,255,255,0.07);
  --border2:      rgba(255,255,255,0.12);
  --text:         #e8e8ec;
  --text2:        #9898a8;
  --text3:        #5a5a6a;
  --accent:       #7c6dfa;
  --accent2:      #5b4ee0;
  --accent-glow:  rgba(124,109,250,0.25);
  --green:        #3dd68c;
  --red:          #ff5c6c;
  --yellow:       #ffc542;
  --topbar-bg:    rgba(13,13,15,0.95);
  --editor-bg:    #0d0d0f;
  --cm-theme:     material-darker;
  --splash-bg:    #1a1a2e;
  --device-label: rgba(255,255,255,0.45);
  --scrollbar:    rgba(255,255,255,0.08);
  --scrollbar-h:  rgba(255,255,255,0.18);
}

[data-theme="light"] {
  --bg:           #f0f0f4;
  --surface:      #ffffff;
  --surface2:     #f8f8fc;
  --surface3:     #ededf2;
  --border:       rgba(0,0,0,0.07);
  --border2:      rgba(0,0,0,0.13);
  --text:         #111118;
  --text2:        #6b6b7e;
  --text3:        #aaaabc;
  --accent:       #5b4ee0;
  --accent2:      #7c6dfa;
  --accent-glow:  rgba(91,78,224,0.15);
  --green:        #1a9e6a;
  --red:          #d93e4e;
  --yellow:       #c78a00;
  --topbar-bg:    rgba(240,240,244,0.95);
  --editor-bg:    #fafafa;
  --cm-theme:     eclipse;
  --splash-bg:    #e8e8f8;
  --device-label: rgba(0,0,0,0.4);
  --scrollbar:    rgba(0,0,0,0.07);
  --scrollbar-h:  rgba(0,0,0,0.2);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.topbar {
  height: var(--topbar-h);
  background: var(--topbar-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  position: relative;
  z-index: 100;
  flex-shrink: 0;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-right: 8px;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px var(--accent-glow);
}
.logo-text {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}
.logo-text span { color: var(--accent); }

.topbar-sep {
  width: 1px; height: 20px;
  background: var(--border2);
  margin: 0 4px;
}

.topbar-btn {
  height: 30px;
  padding: 0 12px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all 150ms ease;
  white-space: nowrap;
}
.topbar-btn:hover {
  background: var(--surface3);
  color: var(--text);
  border-color: var(--border2);
}
.topbar-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.topbar-btn.primary:hover { background: var(--accent2); }
.topbar-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.topbar-spacer { flex: 1; }

/* App name input */
.app-name-wrap {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
}
.app-name-input {
  background: transparent;
  border: none;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  outline: none;
  padding: 4px 8px;
  border-radius: 6px;
  width: 180px;
  transition: background 150ms;
}
.app-name-input:hover { background: var(--surface3); }
.app-name-input:focus { background: var(--surface3); }

/* Status dot */
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Theme toggle */
.theme-toggle {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: all 150ms;
}
.theme-toggle:hover { background: var(--surface3); color: var(--text); }
.theme-toggle svg { width: 15px; height: 15px; }

/* ═══════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════ */
.main {
  display: flex;
  height: calc(100vh - var(--topbar-h));
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   EDITOR PANEL
═══════════════════════════════════════════════ */
.editor-panel {
  width: var(--editor-w);
  min-width: 280px;
  max-width: calc(100vw - var(--device-bar-w) - 300px);
  display: flex;
  flex-direction: column;
  background: var(--editor-bg);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
}

/* Editor Tabs */
.editor-tabs {
  height: var(--editor-tabs-h);
  display: flex;
  align-items: stretch;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  gap: 2px;
  flex-shrink: 0;
}
.editor-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 0 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 150ms;
  position: relative;
  user-select: none;
  font-family: var(--font-ui);
  letter-spacing: 0.2px;
}
.editor-tab:hover { color: var(--text2); }
.editor-tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}
.editor-tab svg { width: 13px; height: 13px; }
.tab-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-left: 2px;
}
.tab-dot.html { background: #ff7b6b; }
.tab-dot.css  { background: #7bc8fb; }
.tab-dot.js   { background: #ffd76b; }

/* Editor toolbar */
.editor-toolbar {
  height: 34px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 4px;
  flex-shrink: 0;
}
.toolbar-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 120ms;
}
.toolbar-btn:hover { background: var(--surface3); color: var(--text); }
.toolbar-btn svg { width: 13px; height: 13px; }
.toolbar-sep {
  width: 1px; height: 16px;
  background: var(--border2);
  margin: 0 3px;
}
.toolbar-label {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-code);
  margin-left: auto;
}

/* CodeMirror overrides */
.editor-cm-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.editor-cm-wrap .CodeMirror {
  height: 100%;
  font-family: var(--font-code);
  font-size: 13px;
  line-height: 1.7;
  background: var(--editor-bg) !important;
}
[data-theme="dark"] .editor-cm-wrap .CodeMirror {
  background: #0d0d0f !important;
  color: #c9d1d9;
}
[data-theme="light"] .editor-cm-wrap .CodeMirror {
  background: #fafafa !important;
  color: #24292f;
}
.editor-cm-wrap .CodeMirror-scroll { padding-bottom: 40px; }
.editor-cm-wrap .CodeMirror-gutters {
  border-right: 1px solid var(--border) !important;
  background: var(--surface) !important;
}
[data-theme="light"] .editor-cm-wrap .CodeMirror-gutters {
  background: #f0f0f4 !important;
}
.editor-cm-wrap .CodeMirror-linenumber { color: var(--text3) !important; }
.editor-cm-wrap .CodeMirror-activeline-background {
  background: var(--surface2) !important;
}
.editor-cm-wrap .CodeMirror-cursor {
  border-left: 2px solid var(--accent) !important;
}

/* Status bar */
.editor-statusbar {
  height: 24px;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 12px;
  font-family: var(--font-code);
  font-size: 10.5px;
  color: rgba(255,255,255,0.85);
  flex-shrink: 0;
}
.statusbar-item { display: flex; align-items: center; gap: 5px; }
.statusbar-item svg { width: 11px; height: 11px; }

/* ═══════════════════════════════════════════════
   RESIZE HANDLE
═══════════════════════════════════════════════ */
.resize-handle {
  width: var(--resize-w);
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  transition: background 150ms;
}
.resize-handle:hover, .resize-handle.dragging {
  background: var(--accent);
}

/* ═══════════════════════════════════════════════
   PREVIEW PANEL
═══════════════════════════════════════════════ */
.preview-panel {
  flex: 1;
  display: flex;
  min-width: 0;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

/* Device sidebar */
.device-sidebar {
  width: var(--device-bar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0;
  gap: 6px;
  overflow-y: auto;
  flex-shrink: 0;
}
.device-sidebar::-webkit-scrollbar { display: none; }

.device-chip {
  width: 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 8px 4px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 180ms ease;
  border: 1px solid transparent;
  position: relative;
}
.device-chip:hover { background: var(--surface2); }
.device-chip.active {
  background: var(--accent-glow);
  border-color: var(--accent);
}
.device-chip svg { width: 22px; height: 22px; color: var(--text2); }
.device-chip.active svg { color: var(--accent); }
.device-chip-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--text3);
  text-align: center;
  letter-spacing: 0.3px;
  line-height: 1.2;
}
.device-chip.active .device-chip-label { color: var(--accent); }

.device-sidebar-sep {
  width: 32px; height: 1px;
  background: var(--border);
  margin: 3px 0;
}

/* Preview canvas */
.preview-canvas {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  padding: 30px 20px;
  position: relative;
}
.preview-canvas::-webkit-scrollbar { width: 6px; height: 6px; }
.preview-canvas::-webkit-scrollbar-track { background: transparent; }
.preview-canvas::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
.preview-canvas::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-h); }

/* Device background label */
.canvas-device-label {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 600;
  color: var(--device-label);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════
   DEVICE FRAMES
═══════════════════════════════════════════════ */
.device-wrapper {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

/* Generic phone shell */
.phone-shell {
  position: relative;
  flex-shrink: 0;
}
.phone-shell .shell-body {
  border-radius: var(--shell-radius, 44px);
  background: var(--shell-bg, #1a1a1e);
  padding: var(--shell-pad, 12px);
  box-shadow: var(--shell-shadow,
    0 0 0 1px rgba(255,255,255,0.08),
    0 40px 120px rgba(0,0,0,0.5),
    inset 0 0 0 1px rgba(255,255,255,0.03));
}
.phone-shell .shell-screen {
  overflow: hidden;
  border-radius: var(--screen-radius, 34px);
  background: #000;
  position: relative;
}
.phone-shell iframe {
  display: block;
  border: none;
  width: 100%;
  height: 100%;
}

/* ── iPhone 15 Pro ── */
.device-iphone15 {
  --shell-bg: #1c1c1e;
  --shell-radius: 54px;
  --shell-pad: 13px;
  --screen-radius: 44px;
  --shell-shadow:
    0 0 0 1px rgba(255,255,255,0.1),
    0 50px 140px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.06);
}
.device-iphone15 .shell-body { width: 300px; }
.device-iphone15 .shell-screen { width: 274px; height: 594px; }
.device-iphone15 .dynamic-island {
  position: absolute;
  top: 20px; left: 50%; transform: translateX(-50%);
  width: 100px; height: 30px;
  background: #000;
  border-radius: 20px;
  z-index: 10;
  pointer-events: none;
}
/* side buttons */
.device-iphone15::before {
  content: '';
  position: absolute;
  right: -3px; top: 100px;
  width: 3px; height: 70px;
  background: #2a2a2c;
  border-radius: 2px;
}
.device-iphone15 .btn-l1, .device-iphone15 .btn-l2, .device-iphone15 .btn-l3 {
  position: absolute;
  left: -3px;
  width: 3px;
  background: #2a2a2c;
  border-radius: 2px;
}
.device-iphone15 .btn-l1 { top: 85px; height: 28px; }
.device-iphone15 .btn-l2 { top: 128px; height: 60px; }
.device-iphone15 .btn-l3 { top: 200px; height: 60px; }

/* ── Samsung Galaxy S24 ── */
.device-samsung-s24 {
  --shell-bg: linear-gradient(160deg, #1a1a1f 0%, #0e0e12 100%);
  --shell-radius: 48px;
  --shell-pad: 11px;
  --screen-radius: 40px;
  --shell-shadow:
    0 0 0 1px rgba(255,255,255,0.07),
    0 50px 140px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.04);
}
.device-samsung-s24 .shell-body { width: 285px; }
.device-samsung-s24 .shell-screen { width: 263px; height: 570px; }
.device-samsung-s24 .punch-hole {
  position: absolute;
  top: 14px; left: 50%; transform: translateX(-50%);
  width: 11px; height: 11px;
  background: #000;
  border-radius: 50%;
  z-index: 10;
  pointer-events: none;
}
.device-samsung-s24::after {
  content: '';
  position: absolute;
  right: -3px; top: 90px;
  width: 3px; height: 80px;
  background: #1a1a1f;
  border-radius: 2px;
}

/* ── Samsung Galaxy A55 ── */
.device-samsung-a55 {
  --shell-bg: #222228;
  --shell-radius: 42px;
  --shell-pad: 10px;
  --screen-radius: 35px;
  --shell-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 40px 100px rgba(0,0,0,0.45);
}
.device-samsung-a55 .shell-body { width: 270px; }
.device-samsung-a55 .shell-screen { width: 250px; height: 540px; }
.device-samsung-a55 .punch-hole {
  position: absolute;
  top: 13px; left: 50%; transform: translateX(-50%);
  width: 10px; height: 10px;
  background: #000; border-radius: 50%;
  z-index: 10; pointer-events: none;
}

/* ── iPad Pro 11" ── */
.device-ipad-pro {
  --shell-bg: #1c1c1e;
  --shell-radius: 22px;
  --shell-pad: 14px;
  --screen-radius: 12px;
  --shell-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 40px 120px rgba(0,0,0,0.5);
}
.device-ipad-pro .shell-body { width: 480px; }
.device-ipad-pro .shell-screen { width: 452px; height: 620px; }
.device-ipad-pro .face-cam {
  position: absolute;
  top: 50%;transform: translateY(-50%);
  left: 22px;
  width: 9px; height: 9px;
  background: #2a2a2c; border-radius: 50%;
  z-index: 10; pointer-events: none;
}

/* ── Samsung Galaxy Tab S9 ── */
.device-samsung-tab {
  --shell-bg: #18181c;
  --shell-radius: 20px;
  --shell-pad: 12px;
  --screen-radius: 10px;
  --shell-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 40px 100px rgba(0,0,0,0.45);
}
.device-samsung-tab .shell-body { width: 460px; }
.device-samsung-tab .shell-screen { width: 436px; height: 600px; }
.device-samsung-tab .punch-hole-tab {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  left: 20px;
  width: 8px; height: 8px;
  background: #000; border-radius: 50%;
  z-index: 10; pointer-events: none;
}

/* ── Google Pixel 8 ── */
.device-pixel8 {
  --shell-bg: #1e1e22;
  --shell-radius: 46px;
  --shell-pad: 12px;
  --screen-radius: 36px;
  --shell-shadow:
    0 0 0 1px rgba(255,255,255,0.07),
    0 45px 120px rgba(0,0,0,0.5);
}
.device-pixel8 .shell-body { width: 278px; }
.device-pixel8 .shell-screen { width: 254px; height: 550px; }
/* Pixel camera bar */
.device-pixel8 .camera-bar {
  position: absolute;
  top: -2px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 10px;
  background: #2a2a30; border-radius: 0 0 6px 6px;
  z-index: 5; pointer-events: none;
}
.device-pixel8 .punch-hole {
  position: absolute;
  top: 17px; left: 50%; transform: translateX(-50%);
  width: 10px; height: 10px;
  background: #000; border-radius: 50%;
  z-index: 10; pointer-events: none;
}

/* ═══════════════════════════════════════════════
   SPLASH SCREEN
═══════════════════════════════════════════════ */
.splash-overlay {
  position: absolute;
  inset: 0;
  background: var(--splash-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 20;
  cursor: pointer;
  transition: opacity 500ms ease, transform 500ms ease;
  border-radius: inherit;
}
.splash-overlay.hidden {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}
.splash-icon {
  width: 72px; height: 72px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
  animation: splashPop 600ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.splash-icon svg { width: 36px; height: 36px; color: #fff; }
@keyframes splashPop {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.splash-app-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.splash-hint {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.3px;
  position: absolute;
  bottom: 24px;
  left: 0; right: 0;
  text-align: center;
}

/* ═══════════════════════════════════════════════
   DEVICE LABEL BADGE
═══════════════════════════════════════════════ */
.device-badge {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.4px;
  display: flex; align-items: center; gap: 7px;
}
.device-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

/* ═══════════════════════════════════════════════
   SCROLLBARS
═══════════════════════════════════════════════ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-h); }

/* ═══════════════════════════════════════════════
   RUN INDICATOR
═══════════════════════════════════════════════ */
.run-flash {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  animation: runFlash 600ms ease forwards;
}
@keyframes runFlash {
  0%   { opacity: 0; transform: translateX(-100%); }
  50%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(100%); }
}

/* Tooltip */
[data-tip] { position: relative; }
[data-tip]::after {
  content: attr(data-tip);
  position: absolute;
  left: 60px; top: 50%; transform: translateY(-50%);
  background: var(--surface3);
  color: var(--text);
  font-size: 10.5px;
  font-weight: 600;
  font-family: var(--font-ui);
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
  border: 1px solid var(--border2);
  opacity: 0;
  pointer-events: none;
  transition: opacity 150ms;
  z-index: 200;
}
[data-tip]:hover::after { opacity: 1; }
</style>

    screenW: 254, screenH: 550,
    buildExtra: (shell) => {
      shell.innerHTML += `<div class="camera-bar"></div><div class="punch-hole"></div>`;
    }
  },
  'ipad-pro': {
    label: 'iPad Pro 11"',
    cls: 'device-ipad-pro',
    screenW: 452, screenH: 620,
    buildExtra: (shell) => { shell.innerHTML += `<div class="face-cam"></div>`; }
  },
  'samsung-tab': {
    label: 'Samsung Galaxy Tab S9',
    cls: 'device-samsung-tab',
    screenW: 436, screenH: 600,
    buildExtra: (shell) => { shell.innerHTML += `<div class="punch-hole-tab"></div>`; }
  }
};

/* ═══════════════════════════════════════════════
   BUILD PREVIEW HTML
═══════════════════════════════════════════════ */
function buildPreviewHTML() {
  const html = state.code.html;
  const css  = state.code.css;
  const js   = state.code.js;

  // Inject extra CSS & JS into the HTML
  const hasHead = /<\/head>/i.test(html);
  const cssTag  = `<style>${css}</style>`;
  const jsTag   = `<script>${js}<\/script>`;

  if (hasHead) {
    return html
      .replace(/<\/head>/i, cssTag + '</head>')
      .replace(/<\/body>/i, jsTag + '</body>');
  }
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">${cssTag}</head><body>${html}${jsTag}</body></html>`;
}

/* ═══════════════════════════════════════════════
   RENDER DEVICE
═══════════════════════════════════════════════ */
function renderDevice(deviceKey) {
  const cfg = DEVICES[deviceKey];
  const wrapper = document.getElementById('deviceWrapper');
  const label   = document.getElementById('deviceLabel');
  label.textContent = cfg.label;

  let sw = cfg.screenW, sh = cfg.screenH;
  if (state.rotated && (deviceKey === 'ipad-pro' || deviceKey === 'samsung-tab')) {
    [sw, sh] = [sh, sw];
  }

  wrapper.innerHTML = '';

  const phoneShell = document.createElement('div');
  phoneShell.className = `phone-shell ${cfg.cls}`;

  const body = document.createElement('div');
  body.className = 'shell-body';

  const screen = document.createElement('div');
  screen.className = 'shell-screen';
  screen.style.width  = sw + 'px';
  screen.style.height = sh + 'px';

  // Splash
  const splash = document.createElement('div');
  splash.className = 'splash-overlay';
  if (!state.splashVisible) splash.classList.add('hidden');

  const iconWrap = document.createElement('div');
  iconWrap.className = 'splash-icon';
  iconWrap.innerHTML = `<svg width="36" height="36"><use href="#ic-zap" stroke="#fff" stroke-width="2.5"/></svg>`;

  const splashName = document.createElement('div');
  splashName.className = 'splash-app-name';
  splashName.textContent = state.appName;

  const splashHint = document.createElement('div');
  splashHint.className = 'splash-hint';
  splashHint.textContent = 'tap to open';

  splash.appendChild(iconWrap);
  splash.appendChild(splashName);
  splash.appendChild(splashHint);

  splash.addEventListener('click', () => {
    splash.classList.add('hidden');
    state.splashVisible = false;
  });

  // iframe
  const iframe = document.createElement('iframe');
  iframe.id = 'previewIframe';
  iframe.title = 'App Preview';
  iframe.style.width  = sw + 'px';
  iframe.style.height = sh + 'px';
  iframe.style.border = 'none';
  iframe.style.display = 'block';
  iframe.style.background = '#fff';

  screen.appendChild(splash);
  screen.appendChild(iframe);
  body.appendChild(screen);
  phoneShell.appendChild(body);
  cfg.buildExtra(phoneShell);

  // badge
  const badge = document.createElement('div');
  badge.className = 'device-badge';
  badge.innerHTML = `<div class="device-badge-dot"></div>${cfg.label}`;

  wrapper.appendChild(phoneShell);
  wrapper.appendChild(badge);

  injectIntoIframe(iframe);
}

function injectIntoIframe(iframe) {
  const html = buildPreviewHTML();
  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  iframe.src = url;
}

function refreshPreview() {
  const iframe = document.getElementById('previewIframe');
  if (iframe) injectIntoIframe(iframe);
  // Flash
  const bar = document.getElementById('runFlashBar');
  bar.className = 'run-flash';
  setTimeout(() => bar.className = '', 700);
}

/* ═══════════════════════════════════════════════
   CODEMIRROR SETUP
═══════════════════════════════════════════════ */
let editors = {};

function getCMMode(tab) {
  return tab === 'html' ? 'htmlmixed' : tab === 'css' ? 'css' : 'javascript';
}

function initEditors() {
  const textarea = document.getElementById('codeEditor');

  // Create one editor, swap content on tab switch
  const cm = CodeMirror.fromTextArea(textarea, {
    mode: 'htmlmixed',
    theme: state.theme === 'dark' ? 'material-darker' : 'eclipse',
    lineNumbers: true,
    lineWrapping: state.wrap,
    autoCloseTags: true,
    autoCloseBrackets: true,
    matchBrackets: true,
    styleActiveLine: true,
    foldGutter: true,
    gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
    tabSize: 2,
    indentWithTabs: false,
    extraKeys: {
      'Ctrl-Space': 'autocomplete',
      'Ctrl-/': 'toggleComment',
      'Ctrl-Z': function(cm) { cm.undo(); },
      'Ctrl-Y': function(cm) { cm.redo(); },
      'Ctrl-F': function(cm) { cm.execCommand('find'); },
      'Ctrl-Enter': function() { runCode(); }
    }
  });

  cm.setValue(state.code.html);
  cm.on('change', () => {
    state.code[state.activeTab] = cm.getValue();
    // live update
    scheduleRefresh();
  });
  cm.on('cursorActivity', () => {
    const c = cm.getCursor();
    document.getElementById('cursorPos').textContent = `Ln ${c.line+1}, Col ${c.ch+1}`;
  });

  editors.cm = cm;
}

let refreshTimer = null;
function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refreshPreview, 800);
}

/* ═══════════════════════════════════════════════
   TAB SWITCHING
═══════════════════════════════════════════════ */
function switchTab(tab) {
  // Save current
  state.code[state.activeTab] = editors.cm.getValue();
  state.activeTab = tab;

  editors.cm.setValue(state.code[tab]);
  editors.cm.setOption('mode', getCMMode(tab));

  document.getElementById('statusLang').textContent = tab.toUpperCase();

  document.querySelectorAll('.editor-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
}

/* ═══════════════════════════════════════════════
   DEVICE SWITCHING
═══════════════════════════════════════════════ */
function switchDevice(key) {
  state.activeDevice = key;
  document.querySelectorAll('.device-chip[data-device]').forEach(c => {
    c.classList.toggle('active', c.dataset.device === key);
  });
  state.splashVisible = true;
  renderDevice(key);
}

/* ═══════════════════════════════════════════════
   RUN
═══════════════════════════════════════════════ */
function runCode() {
  state.code[state.activeTab] = editors.cm.getValue();
  state.splashVisible = false;
  refreshPreview();
}

/* ═══════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════ */
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  editors.cm.setOption('theme', state.theme === 'dark' ? 'material-darker' : 'eclipse');
  const icon = document.getElementById('themeIcon');
  icon.setAttribute('href', state.theme === 'dark' ? '#ic-moon' : '#ic-sun');
}

/* ═══════════════════════════════════════════════
   RESIZE PANEL
═══════════════════════════════════════════════ */
function initResize() {
  const handle = document.getElementById('resizeHandle');
  const panel  = document.getElementById('editorPanel');
  let dragging = false;
  let startX, startW;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const newW = Math.max(280, Math.min(startW + dx, window.innerWidth - 400));
    panel.style.width = newW + 'px';
    editors.cm.refresh();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

/* ═══════════════════════════════════════════════
   TOOLBAR ACTIONS
═══════════════════════════════════════════════ */
function formatCode() {
  // Simple indent formatter
  const val = editors.cm.getValue();
  let indented = '';
  let level = 0;
  const lines = val.split('\n');
  lines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) { indented += '\n'; return; }
    if (/^<\//.test(trimmed) || /\/>$/.test(trimmed)) {
      if (/^<\//.test(trimmed)) level = Math.max(0, level - 1);
      indented += '  '.repeat(level) + trimmed + '\n';
      return;
    }
    if (/^<[^!?\/][^>]*[^\/]>$/.test(trimmed) && !/<.*>.*<\/.*>/.test(trimmed)) {
      indented += '  '.repeat(level) + trimmed + '\n';
      level++;
      return;
    }
    indented += '  '.repeat(level) + trimmed + '\n';
  });
  editors.cm.setValue(indented.trimEnd());
}

/* ═══════════════════════════════════════════════
   EXPORT
═══════════════════════════════════════════════ */
function exportApp() {
  const html = buildPreviewHTML();
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.appName.replace(/\s+/g,'-').toLowerCase() || 'app') + '.html';
  a.click();
}

/* ═══════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════ */
document.querySelectorAll('.editor-tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

document.querySelectorAll('.device-chip[data-device]').forEach(c => {
  c.addEventListener('click', () => switchDevice(c.dataset.device));
});

document.getElementById('rotatBtn').addEventListener('click', () => {
  state.rotated = !state.rotated;
  renderDevice(state.activeDevice);
});

document.getElementById('btnRun').addEventListener('click', runCode);
document.getElementById('btnExport').addEventListener('click', exportApp);
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
document.getElementById('btnUndo').addEventListener('click', () => editors.cm.undo());
document.getElementById('btnRedo').addEventListener('click', () => editors.cm.redo());

document.getElementById('appNameInput').addEventListener('input', e => {
  state.appName = e.target.value || 'My App';
  // Update splash if visible
  const splashNames = document.querySelectorAll('.splash-app-name');
  splashNames.forEach(s => s.textContent = state.appName);
});

document.getElementById('tbFormat').addEventListener('click', formatCode);
document.getElementById('tbSearch').addEventListener('click', () => {
  editors.cm.execCommand('find');
});
document.getElementById('tbCopy').addEventListener('click', () => {
  navigator.clipboard.writeText(editors.cm.getValue()).then(() => {
    const btn = document.getElementById('tbCopy');
    btn.style.color = 'var(--green)';
    setTimeout(() => btn.style.color = '', 1000);
  });
});
document.getElementById('tbWrap').addEventListener('click', () => {
  state.wrap = !state.wrap;
  editors.cm.setOption('lineWrapping', state.wrap);
  const btn = document.getElementById('tbWrap');
  btn.style.color = state.wrap ? 'var(--accent)' : '';
});

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
window.addEventListener('load', () => {
  initEditors();
  initResize();
  renderDevice(state.activeDevice);
});
</script>
</body>
</html>
